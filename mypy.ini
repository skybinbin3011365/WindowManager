[mypy]
python_version = 3.12
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
no_implicit_optional = False
warn_redundant_casts = False
warn_unused_ignores = False
show_error_codes = True
ignore_missing_imports = True
follow_imports = skip

[mypy-src.*]
ignore_missing_imports = True

[mypy-*.main_window_ops]
ignore_errors = True

[mypy-*.window_operations]
ignore_errors = True

[mypy-*.window_keywords]
ignore_errors = True

[mypy-*.window_switch]
ignore_errors = True

[mypy-*.window_manager_ui]
ignore_errors = True

[mypy-*.config_handler]
ignore_errors = True

[mypy-*.manager]
ignore_errors = True

[mypy-*.ui_main]
ignore_errors = True

[mypy-*.ui_settings]
ignore_errors = True

[mypy-*.ui_about]
ignore_errors = True

[mypy-*.ui]
ignore_errors = True

[mypy-*.app]
ignore_errors = True

[mypy-*.hotkey_manager]
ignore_errors = True

[mypy-*.hotkey_recorder]
ignore_errors = True

[mypy-*.hotkey_recorder_core]
ignore_errors = True

[mypy-*.widgets.*]
ignore_errors = True

[mypy-psutil.*]
ignore_missing_imports = True

[mypy-win32gui.*]
ignore_missing_imports = True

[mypy-win32con.*]
ignore_missing_imports = True

[mypy-win32api.*]
ignore_missing_imports = True

[mypy-win32process.*]
ignore_missing_imports = True

[mypy-pynput.*]
ignore_missing_imports = True

[mypy-PySide6.*]
ignore_missing_imports = True
